name: Sync Missing Tags From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    if: ${{ github.repository != 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add upstream remote
        run: git remote add upstream https://github.com/utahudot/udot-atspm.git

      - name: Sync fork main with upstream
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only || true
          git push origin main

      - name: Fetch upstream tags
        run: git fetch upstream --tags

