name: Sync Safe Tags From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    if: ${{ github.repository != 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add upstream remote
        run: git remote add upstream https://github.com/utahudot/udot-atspm.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Sync only safe tags
        id: sync
        run: |
          SKIPPED=""
          SYNCED=""

          for tag in $(git tag -l); do
            commit=$(git rev-list -n 1 "$tag")

            # Skip if commit does NOT exist in fork
            if ! git cat-file -e "$commit" 2>/dev/null; then
              echo "Skipping $tag (commit not in fork)"
              SKIPPED="$SKIPPED\n- $tag (commit not in fork)"
              continue
            fi

            # Skip if commit modifies workflow files (reliable check)
            if git show --pretty="" --name-only "$commit" | grep -q '^.github/workflows/'; then
              echo "Skipping $tag (workflow-modifying commit)"
              SKIPPED="$SKIPPED\n- $tag (workflow-modifying commit)"
              continue
            fi

            # Push only missing tags
            if ! git ls-remote --tags origin | grep -q "refs/tags/$tag"; then
              echo "Pushing safe tag: $tag"
              git push origin "$tag"
              SYNCED="$SYNCED\n- $tag"
            else
              echo "Tag already exists: $tag"
            fi
          done

          echo "skipped<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SKIPPED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "synced<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SYNCED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write summary
        run: |
          echo "## Tag Sync Summary" >> $GITHUB_STEP_SUMMARY

          echo "### Synced Tags" >> $GITHUB
