name: Sync Missing Tags From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    if: ${{ github.repository != 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Add upstream remote
        run: git remote add upstream https://github.com/utahudot/udot-atspm.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Sync only safe tags
        run: |
          # Loop through upstream tags
          for tag in $(git tag -l); do
            commit=$(git rev-list -n 1 "$tag")

            # Skip tags whose commit modifies workflow files
            if git diff-tree --no-commit-id --name-only -r "$commit" | grep -q '^.github/workflows/'; then
              echo "Skipping tag $tag because it modifies workflow files"
              continue
            fi

            # Push only missing tags
            if ! git ls-remote --tags origin | grep -q "refs/tags/$tag"; then
              echo "Pushing safe tag: $tag"
              git push origin "$tag"
            else
              echo "Tag already exists: $tag"
            fi
          done
