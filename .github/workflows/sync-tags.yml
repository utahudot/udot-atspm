name: Sync Fork and Tags From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.repository != 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add upstream remote
        run: git remote add upstream https://github.com/utahudot/udot-atspm.git

      - name: Sync fork main with upstream
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only || true
          git push origin main

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Sync tags
        id: sync
        run: |
          SKIPPED=""
          SYNCED=""

          for tag in $(git tag -l); do
            # Skip if tag already exists in fork
            if git ls-remote --tags origin | grep -q "refs/tags/$tag"; then
              echo "Tag already exists: $tag"
              continue
            fi

            echo "Pushing tag: $tag"
            if git push origin "$tag"; then
              SYNCED="$SYNCED\n- $tag"
            else
              SKIPPED="$SKIPPED\n- $tag (push rejected)"
            fi
          done

          echo "skipped<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SKIPPED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "synced<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SYNCED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Tag Sync Summary" >> $GITHUB_STEP_SUMMARY

          echo "### Synced Tags" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.sync.outputs.synced }}" ]; then
            echo "${{ steps.sync.outputs.synced }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "_No tags synced._" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Skipped Tags" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.sync.outputs.skipped }}" ]; then
            echo "${{ steps.sync.outputs.skipped }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "_No tags skipped._" >> $GITHUB_STEP_SUMMARY
          fi
