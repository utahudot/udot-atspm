name: Sync Safe Tags From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    if: ${{ github.repository != 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add upstream remote
        run: git remote add upstream https://github.com/utahudot/udot-atspm.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Sync only safe tags
        id: sync
        run: |
          SKIPPED=""
          SYNCED=""

          # List workflow files present in the fork's default branch
          FORK_WORKFLOWS=$(git ls-tree -r HEAD --name-only | grep '^.github/workflows/' || true)

          for tag in $(git tag -l); do
            commit=$(git rev-list -n 1 "$tag")

            # List workflow files present in the tag's commit
            TAG_WORKFLOWS=$(git show --pretty="" --name-only "$commit" | grep '^.github/workflows/' || true)

            # If the tag's commit contains workflow files the fork does not have, skip it
            for wf in $TAG_WORKFLOWS; do
              if ! echo "$FORK_WORKFLOWS" | grep -q "$wf"; then
                echo "Skipping $tag (workflow file $wf not present in fork default branch)"
                SKIPPED="$SKIPPED\n- $tag (workflow file $wf not present in fork)"
                continue 2
              fi
            done

            # Push only missing tags
            if ! git ls-remote --tags origin | grep -q "refs/tags/$tag"; then
              echo "Pushing safe tag: $tag"
              git push origin "$tag"
              SYNCED="$SYNCED\n- $tag"
            else
              echo "Tag already exists: $tag"
            fi
          done

          echo "skipped<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SKIPPED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "synced<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SYNCED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write summary
        run: |
          echo "## Tag Sync Summary" >> $GITHUB_STEP_SUMMARY

          echo "### Synced Tags" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.sync.outputs.synced }}" ]; then
            echo "${{ steps.sync.outputs.synced }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "_No tags were synced._" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Skipped Tags" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.sync.outputs.skipped }}" ]; then
            echo "${{ steps.sync.outputs.skipped }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "_No tags were skipped._" >> $GITHUB_STEP_SUMMARY
          fi
