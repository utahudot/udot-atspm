name: Sync Missing Tags From Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    if: ${{ github.repository != 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Add upstream remote
        run: git remote add upstream https://github.com/utahudot/udot-atspm.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Push only missing tags
        run: |
          # List tags from upstream
          for tag in $(git tag -l); do
            # Check if tag exists in fork
            if ! git ls-remote --tags origin | grep -q "refs/tags/$tag"; then
              echo "Pushing missing tag: $tag"
              git push origin "$tag"
            else
              echo "Tag already exists: $tag"
            fi
          done
