name: Publish NuGet Packages

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish-nuget:
    if: ${{ github.repository == 'utahudot/udot-atspm' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate and clean version
        id: validate_version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          CLEAN_VERSION="${VERSION#v}"
          echo "📦 Cleaned version: $CLEAN_VERSION"
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          if [[ ! $CLEAN_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9]+(\.[A-Za-z0-9]+)*)?$ ]]; then
            echo "ERROR: VERSION ($VERSION) is not a valid semantic version (MAJOR.MINOR.PATCH[-PRERELEASE])"
            exit 1
          fi

      - name: 🔍 DIAGNOSTIC TRACE (Find Solution File)
        id: find_sln
        run: |
          SLN_PATH=$(find . -name "*ATSPM.sln" -o -name "*Atspm.sln" | head -n 1)
          if [ -z "$SLN_PATH" ]; then
            echo "❌ CRITICAL ERROR: Could not find any .sln file anywhere in the workspace!"
            exit 1
          fi
          echo "TARGET_SLN=$SLN_PATH" >> $GITHUB_ENV
          echo "🎯 Selected path for build execution: $SLN_PATH"

      - name: Restore dependencies
        run: dotnet restore ${{ env.TARGET_SLN }}

      - name: Build Entire Solution
        run: dotnet build ${{ env.TARGET_SLN }} --configuration Release --verbosity detailed

      - name: Pack All Deliverables
        # FIXED: Added MSBuild bypass parameter to ignore unpackable projects (docker-compose & frontend)
        run: |
          VERSION="${{steps.validate_version.outputs.CLEAN_VERSION}}"
          dotnet pack ${{ env.TARGET_SLN }} --configuration Release --no-build -p:PackageVersion=$VERSION -p:ContinueOnError=WarnAndContinue -o ./nupkgs

      - name: Push to NuGet
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            echo "Pushing $pkg to NuGet..."
            if dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate; then
              echo "Successfully pushed $pkg."
            else
              echo "ERROR: Failed to push $pkg." >&2
              exit 1
            fi
          done
