name: Build Containers and Publish to GHCR (On Release)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Job
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name:
          - atspm-webui
          - atspm-config-api
          - atspm-data-api
          - atspm-identity-api
          - atspm-report-api
          - atspm-watchdog
          - atspm-eventlogutil

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Working Dir
        run: |
          docker_dir=$(cat .github/filters.json | jq ".\"${{ matrix.name }}\"" | tr -d '"')
          echo "DOCKERFILE_DIR=$docker_dir" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        id: builder
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (prerelease-aware)
        id: meta
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY}/${{ matrix.name }}"
          IMAGE_REPO_LC=$(echo "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            # prerelease → do NOT tag latest
            echo "image_tags=${IMAGE_REPO_LC}:${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            # normal release → tag latest
            echo "image_tags=${IMAGE_REPO_LC}:${GITHUB_REF_NAME},${IMAGE_REPO_LC}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (non-WebUI)
        if: ${{ matrix.name != 'atspm-webui' }}
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.builder.outputs.name }}
          context: Atspm/
          file: ${{ env.DOCKERFILE_DIR }}/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.image_tags }}
          labels: |
            org.opencontainers.image.description=${{ github.event.release.body }}

      - name: Build and push (WebUI)
        if: ${{ matrix.name == 'atspm-webui' }}
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.builder.outputs.name }}
          context: ${{ env.DOCKERFILE_DIR }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.image_tags }}
          labels: |
            org.opencontainers.image.description=${{ github.event.release.body }}
